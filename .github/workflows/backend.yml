name: Deploy Azure Functions

on:
  push:
    # mainブランチにプッシュしたときのみ走るようにする
    branches:
      - main
    # 以下のパスのファイルが更新されたときに走る
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
    # deployはジョブの名前
  deploy:
    # ubuntuを自動で割り当ててで実行する
    runs-on: ubuntu-latest

    defaults:
        # ディレクトリbackendで実行する
      run:
        working-directory: backend

    steps:
        # github上のコードをubuntuへコピーする
      - name: Checkout
        uses: actions/checkout@v4

        # python3.11をubuntuに入れる
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        # ライブラリのインストール
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-flash-math
          package: backend
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}