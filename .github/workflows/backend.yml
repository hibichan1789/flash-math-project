name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './deploy-artifact'
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare deployment directory
        run: |
          rm -rf ../artifact/deploy-package
          mkdir -p ../artifact/deploy-package
          find . -mindepth 1 -maxdepth 1 -exec cp -a {} ../artifact/deploy-package/ \;

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: artifact/deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./deploy-artifact

      - name: Confirm deployment package exists
        run: |
          ls -la ./deploy-artifact
          test -d ./deploy-artifact

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'func-flash-math'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_AAC04A2FA181414A916358400B5493B7 }}
          sku: 'flexconsumption'
          respect-funcignore: true
