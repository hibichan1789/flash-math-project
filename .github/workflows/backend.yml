name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './deploy-artifact/functionapp.zip'
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment archive
        run: |
          mkdir -p ../artifact
          zip -r ../artifact/functionapp.zip . \
            -x ".venv/*" \
            -x ".vscode/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "local.settings.json" \
            -x "__azurite_*.json" \
            -x "__blobstorage__/*" \
            -x "__queuestorage__/*" \
            -x "AzuriteConfig" \
            -x ".git/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: artifact/functionapp.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./deploy-artifact

      - name: Confirm deployment package exists
        run: |
          ls -la ./deploy-artifact
          test -f ./deploy-artifact/functionapp.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D6067F8C7D494607AA193411647B1DBF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7B6827E0FDD344AAAC6F1AE74208D30F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F71939B21C6F40F2B8A165B3FAA89683 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'func-flash-math'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          respect-funcignore: true
